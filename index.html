<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="theme-color" content="#0a0e16">
<title>ParfumTracker</title>
<style>
:root{
  --bg:#0a0e16;
  --card:#11161f;
  --text:#e6edf3;
  --muted:#8b95a5;
  --border:#1f2733;
  --green:#22c55e;
  --red:#ef4444;
  --amber:#f59e0b;
  --violet:#8b5cf6;
  --blue:#3b82f6;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;}
body{font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;background:var(--bg);color:var(--text);padding-bottom:84px;-webkit-font-smoothing:antialiased;}
button,input,select,textarea{font-family:inherit;}
input,select,textarea{background:var(--bg);border:1px solid var(--border);border-radius:9px;padding:11px 12px;color:var(--text);font-size:15px;width:100%;}
input:focus,select:focus,textarea:focus{outline:1px solid var(--blue);}

/* ===== LOGIN ===== */
.login-screen{min-height:100vh;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:24px;text-align:center;}
.login-logo{font-size:54px;margin-bottom:6px;}
.login-title{font-size:26px;font-weight:900;margin-bottom:4px;}
.login-sub{color:var(--muted);font-size:13px;margin-bottom:28px;}
.login-box{width:100%;max-width:340px;}
.login-box input{margin-bottom:12px;text-align:center;letter-spacing:3px;}
.login-err{color:var(--red);font-size:12px;font-weight:700;min-height:18px;margin-bottom:6px;}

/* ===== BUTTONS ===== */
.btn{display:inline-flex;align-items:center;justify-content:center;gap:6px;padding:11px 16px;border-radius:11px;border:1px solid transparent;font-weight:800;font-size:13px;cursor:pointer;color:var(--text);background:var(--card);transition:opacity .15s;}
.btn:active{opacity:.7;}
.btn-full{width:100%;}
.btn-sm{padding:6px 11px;font-size:11px;border-radius:8px;}
.btn-green{background:#22c55e;color:#06240f;}
.btn-red{background:#ef4444;color:#2a0707;}
.btn-amber{background:#f59e0b;color:#2a1700;}
.btn-violet{background:#8b5cf6;color:#1c1033;}
.btn-blue{background:#3b82f6;color:#06192f;}
.btn-ghost{background:transparent;border:1px solid var(--border);color:var(--text);}

/* ===== LAYOUT ===== */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:14px 16px 10px;}
.brand{font-weight:900;font-size:20px;display:flex;align-items:center;gap:8px;}
.role-badge{padding:6px 12px;border-radius:20px;font-size:11px;font-weight:800;border:1px solid var(--border);}
.role-badge.admin{background:#8b5cf622;border-color:#8b5cf655;color:var(--violet);}
.role-badge.vendeur{background:#3b82f622;border-color:#3b82f655;color:var(--blue);}
.topbar-actions{display:flex;gap:8px;align-items:center;}
.icon-btn{width:38px;height:38px;border-radius:11px;border:1px solid var(--border);background:var(--card);color:var(--text);display:flex;align-items:center;justify-content:center;font-size:17px;cursor:pointer;}

.sync-bar{display:flex;align-items:center;gap:8px;padding:6px 16px 12px;font-size:12px;font-weight:700;}
.sync-dot{width:9px;height:9px;border-radius:50%;background:var(--green);}
.sync-dot.off{background:var(--amber);}

#content{padding:0 16px 24px;}

.card{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;}
.sec-head{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
.sec-title{font-size:19px;font-weight:900;display:flex;align-items:center;gap:8px;}

.field{display:flex;flex-direction:column;gap:6px;margin-bottom:10px;}
.field label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
.grid3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px;}

.empty{text-align:center;padding:40px 16px;color:var(--muted);font-size:13px;}
.empty-emoji{font-size:44px;margin-bottom:10px;}

/* ===== OVERLAY / SHEET ===== */
.overlay{position:fixed;inset:0;background:rgba(0,0,0,.62);display:flex;align-items:flex-end;justify-content:center;z-index:1000;}
.sheet{background:#0d1320;border-radius:20px 20px 0 0;width:100%;max-width:540px;max-height:92vh;overflow-y:auto;padding:14px 16px calc(16px + env(safe-area-inset-bottom));}
.sheet-handle{width:38px;height:4px;background:var(--border);border-radius:4px;margin:0 auto 12px;}
.sheet-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;}
.sheet-title{font-weight:900;font-size:16px;}
.sheet-body{display:flex;flex-direction:column;}
.sheet-footer{display:flex;gap:10px;margin-top:14px;}

/* ===== BOTTOM NAV ===== */
.bottomnav{position:fixed;bottom:0;left:0;right:0;background:#0c111c;border-top:1px solid var(--border);display:flex;justify-content:space-around;padding:8px 4px calc(6px + env(safe-area-inset-bottom));z-index:500;}
.nav-item{display:flex;flex-direction:column;align-items:center;gap:2px;font-size:10px;color:var(--muted);font-weight:800;flex:1;background:none;border:none;cursor:pointer;padding:4px 0;}
.nav-item.active{color:var(--blue);}
.nav-icon{font-size:19px;}

/* ===== MISC ===== */
.tag{border-radius:20px;padding:3px 10px;font-size:10px;font-weight:800;border:1px solid;display:inline-block;}
.pill{padding:6px 13px;border-radius:20px;font-size:12px;font-weight:800;border:1px solid var(--border);background:var(--card);color:var(--muted);cursor:pointer;white-space:nowrap;}
.pill.active{color:#fff;}
.pills{display:flex;gap:8px;overflow-x:auto;padding-bottom:4px;margin-bottom:14px;}
.pills::-webkit-scrollbar{display:none;}

.stat-box{background:var(--card);border:1px solid var(--border);border-radius:14px;padding:14px;}
.stat-label{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.5px;margin-bottom:6px;}
.stat-val{font-size:20px;font-weight:900;font-family:monospace;}
.stat-sub{font-size:11px;color:var(--muted);margin-top:4px;}

.cmd-line{background:var(--bg);border:1px solid var(--border);border-radius:11px;padding:10px 12px;margin-bottom:8px;}
.cmd-line-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;}

.commande-card{border:1px solid var(--border);border-radius:14px;padding:14px;margin-bottom:12px;background:var(--card);}
.commande-head{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;gap:8px;}
.commande-client{font-weight:900;font-size:15px;}
.commande-meta{font-size:11px;color:var(--muted);margin-top:2px;}
.commande-item{display:flex;justify-content:space-between;font-size:12px;padding:5px 0;border-bottom:1px solid var(--border);}
.commande-item:last-child{border-bottom:none;}
.commande-total{display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:6px;border-top:2px solid var(--border);font-weight:900;font-size:14px;}
.commande-actions{display:flex;gap:8px;margin-top:10px;}
</style>
</head>
<body>

<div id="screen-login" class="login-screen">
  <div class="login-logo">🧴</div>
  <div class="login-title">ParfumTracker</div>
  <div class="login-sub">Commandes · Stock · Caisse · Crédits</div>
  <div class="login-box">
    <input type="password" id="login-pw" placeholder="Mot de passe" autocomplete="off"/>
    <div class="login-err" id="login-err"></div>
    <button class="btn btn-blue btn-full" onclick="login()">Se connecter</button>
  </div>
</div>

<div id="screen-main" style="display:none">
  <div class="topbar">
    <div class="brand">🧴 ParfumTracker</div>
    <div class="topbar-actions">
      <span class="role-badge" id="role-badge"></span>
      <button class="icon-btn" id="btn-settings" onclick="openSettings()" style="display:none">⚙️</button>
      <button class="icon-btn" onclick="logout()">🚪</button>
    </div>
  </div>
  <div class="sync-bar">
    <span class="sync-dot" id="sync-dot"></span>
    <span id="sync-text" style="color:var(--muted)">Connexion...</span>
  </div>
  <div id="content"></div>
  <div class="bottomnav" id="bottomnav"></div>
</div>

<input type="file" id="photo-input" accept="image/*" style="display:none" onchange="handlePhoto(event)"/>

<script type="module">
/* =========================================================
   FIREBASE CONFIG — À REMPLACER
   1. Aller sur https://console.firebase.google.com
   2. Créer un nouveau projet (ex: "parfumtracker")
   3. Build > Realtime Database > Créer une base de données
   4. Onglet "Règles" -> coller :
      { "rules": { ".read": true, ".write": true } }
   5. ⚙️ Paramètres du projet > Général > "Vos applications"
      > Ajouter une application Web (</>) > copier la config
      et la coller ci-dessous à la place de celle-ci.
   ========================================================= */
const firebaseConfig = {
  apiKey: "AIzaSyA0cgCqzTeisyJPSIklqkb_sdjNcBPKqPc",
  authDomain: "parfumtracker.firebaseapp.com",
  databaseURL: "https://parfumtracker-default-rtdb.firebaseio.com",
  projectId: "parfumtracker",
  storageBucket: "parfumtracker.firebasestorage.app",
  messagingSenderId: "218449819858",
  appId: "1:218449819858:web:66fee9261ad6870104d50b"
};

import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
import { getDatabase, ref, set, push, remove, onValue } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-database.js";

let db=null, fbApp=null;

// ===== MOTS DE PASSE =====
const PW_ADMIN="yh1010";
const PW_VENDEUR="victoire";

/* =========================================================
   GEMINI API — Pour le scan photo du cahier
   1. Aller sur https://aistudio.google.com/apikey
   2. Créer une clé API (gratuit)
   3. La coller ci-dessous à la place de "VOTRE_CLE_GEMINI"
   ========================================================= */
const GEMINI_API_KEY="VOTRE_CLE_GEMINI";
const GEMINI_URL=`https://generativelanguage.googleapis.com/v1beta/models/gemini-2.5-flash:generateContent?key=${GEMINI_API_KEY}`;

// ===== ÉTAT GLOBAL =====
let role=null;
let currentTab="commandes";
let fbProducts={}, fbCommandes={}, fbCaisseMoves={}, fbCredits={}, fbCaisseConfig={}, fbAchats={}, fbDepots={}, fbDepenses={}, fbRetraits={}, fbRapports={};
let loaded={products:false,commandes:false,caisseMoves:false,credits:false,caisseConfig:false,achats:false,depots:false,depenses:false,retraits:false,rapports:false};
let rapportDate=todayStr();
let currentCommande=null; // objet en cours d'édition dans le modal

// ===== HELPERS =====
const MOIS=["Janvier","Février","Mars","Avril","Mai","Juin","Juillet","Août","Septembre","Octobre","Novembre","Décembre"];
function cfa(n){n=Math.round(+n||0);return n.toLocaleString("fr-FR").replace(/\u202f|\u00a0/g," ")+" F";}
function todayStr(){return new Date().toISOString().slice(0,10);}
function dateLabel(d){if(!d)return"";const[y,m,day]=d.split("-").map(Number);return day+" "+MOIS[m-1]+" "+y;}
function tag(text,color){return `<span class="tag" style="background:var(--${color})22;border-color:var(--${color})55;color:var(--${color})">${text}</span>`;}
function el(id){return document.getElementById(id);}
function closeAndRemove(id){const e=el(id);if(e)e.remove();}
window.closeAndRemove=closeAndRemove;
function showModal(id,title,bodyHtml,footerHtml){
  closeAndRemove(id);
  const html=`<div class="overlay" id="${id}"><div class="sheet"><div class="sheet-handle"></div>
  <div class="sheet-header"><span class="sheet-title">${title}</span><button class="btn btn-ghost btn-sm" onclick="closeAndRemove('${id}')">✕</button></div>
  <div class="sheet-body">${bodyHtml}</div>
  ${footerHtml?`<div class="sheet-footer">${footerHtml}</div>`:""}
  </div></div>`;
  document.body.insertAdjacentHTML("beforeend",html);
}

// ===== GETTERS =====
function getProducts(){return Object.entries(fbProducts||{}).map(([id,p])=>({id,...p})).sort((a,b)=>(a.name||"").localeCompare(b.name||""));}
function getP(id){return getProducts().find(p=>p.id===id);}
function getCommandes(){return Object.entries(fbCommandes||{}).map(([k,c])=>({_key:k,...c}));}
function getCaisseMoves(){return Object.entries(fbCaisseMoves||{}).map(([k,m])=>({_key:k,...m}));}
function getCredits(){return Object.entries(fbCredits||{}).map(([k,c])=>({_key:k,...c}));}
function getAchats(){return Object.entries(fbAchats||{}).map(([k,a])=>({_key:k,...a}));}
function getDepots(){return Object.entries(fbDepots||{}).map(([k,d])=>({_key:k,...d}));}
function getDepenses(){return Object.entries(fbDepenses||{}).map(([k,d])=>({_key:k,...d}));}
function getRetraits(){return Object.entries(fbRetraits||{}).map(([k,r])=>({_key:k,...r}));}
function getRapports(){return Object.entries(fbRapports||{}).map(([k,r])=>({_key:k,...r}));}
function monthKey(d){return (d||todayStr()).slice(0,7);}
let rapportMode="view"; // view | manual | scan
let currentRapportVentes=[];
let editingRapportId=null;

// ===================================================================
// AUTH
// ===================================================================
function login(){
  const pw=el("login-pw").value;
  if(pw===PW_ADMIN)role="admin";
  else if(pw===PW_VENDEUR)role="vendeur";
  else{el("login-err").textContent="❌ Mot de passe incorrect";return;}
  el("login-err").textContent="";
  el("screen-login").style.display="none";
  el("screen-main").style.display="block";
  el("role-badge").textContent=role==="admin"?"👑 Admin":"🧑‍💼 Vendeur";
  el("role-badge").className="role-badge "+role;
  el("btn-settings").style.display=role==="admin"?"flex":"none";
  currentTab=role==="admin"?"commandes":"rapport";
  buildNav();
  render();
}
window.login=login;
function logout(){
  role=null;
  el("screen-main").style.display="none";
  el("screen-login").style.display="flex";
  el("login-pw").value="";
}
window.logout=logout;

// ===================================================================
// NAVIGATION
// ===================================================================
const TABS=[
  {id:"commandes",label:"Commandes",icon:"📦"},
  {id:"stock",label:"Stock",icon:"🧴"},
  {id:"caisse",label:"Caisse",icon:"🏦"},
  {id:"rapport",label:"Rapport",icon:"📋"},
  {id:"plus",label:"Plus",icon:"⋯"},
];
const SUBTABS=["dashboard","achats","depots","credits","depenses"];
function buildNav(){
  if(role==="vendeur"){
    el("bottomnav").innerHTML=`<button class="nav-item active"><span class="nav-icon">📋</span>Rapport</button>`;
    return;
  }
  el("bottomnav").innerHTML=TABS.map(t=>{
    const active=currentTab===t.id||(t.id==="plus"&&SUBTABS.includes(currentTab));
    return `<button class="nav-item ${active?"active":""}" onclick="switchTab('${t.id}')"><span class="nav-icon">${t.icon}</span>${t.label}</button>`;
  }).join("");
}
function switchTab(id){if(role==="vendeur")return;currentTab=id;buildNav();render();}
window.switchTab=switchTab;
function backBtn(){return `<button class="icon-btn" onclick="switchTab('plus')" style="margin-right:8px">←</button>`;}

function render(){
  if(!loaded.products||!loaded.commandes||!loaded.caisseMoves||!loaded.credits||!loaded.caisseConfig||!loaded.achats||!loaded.depots||!loaded.depenses||!loaded.retraits||!loaded.rapports){
    el("content").innerHTML=`<div class="empty"><div class="empty-emoji">⏳</div>Chargement des données...</div>`;
    return;
  }
  if(role==="vendeur"){currentTab="rapport";renderRapportEmploye();return;}
  if(currentTab==="commandes")renderCommandes();
  else if(currentTab==="stock")renderStock();
  else if(currentTab==="caisse")renderCaisse();
  else if(currentTab==="rapport")renderRapport();
  else if(currentTab==="plus")renderPlus();
  else if(currentTab==="dashboard")renderDashboard();
  else if(currentTab==="achats")renderAchats();
  else if(currentTab==="depots")renderDepots();
  else if(currentTab==="credits")renderCredits();
  else if(currentTab==="depenses")renderDepenses();
}

function renderPlus(){
  const items=[
    {id:"dashboard",icon:"📊",label:"Dashboard",sub:"Bénéfice net réel, capital mobilisé"},
    {id:"achats",icon:"🚚",label:"Achats fournisseur",sub:"Commandes de réapprovisionnement"},
    {id:"depots",icon:"🏪",label:"Dépôts-vente",sub:"Stock placé chez des partenaires"},
    {id:"credits",icon:"🤝",label:"Crédits clients",sub:"Suivi des montants dus"},
    {id:"depenses",icon:"💸",label:"Dépenses & Retraits",sub:"Dépenses, retraits Hadi/Youssef"},
  ];
  el("content").innerHTML=`
  <div class="sec-head"><span class="sec-title">⋯ Plus</span></div>
  ${items.map(it=>`<div class="card" style="cursor:pointer;display:flex;align-items:center;gap:14px" onclick="switchTab('${it.id}')">
  <div style="font-size:28px">${it.icon}</div>
  <div style="flex:1"><div style="font-weight:800;font-size:15px">${it.label}</div><div style="font-size:11px;color:var(--muted);margin-top:2px">${it.sub}</div></div>
  <div style="color:var(--muted)">›</div>
  </div>`).join("")}
  `;
}

// ===================================================================
// COMMANDES
// ===================================================================
const STATUT_LABEL={attente:"⏳ En attente",paye:"✅ Payé",credit:"💳 Crédit",retour:"↩ Retour"};
const STATUT_COLOR={attente:"amber",paye:"green",credit:"blue",retour:"red"};

function renderCommandes(){
  const all=getCommandes().sort((a,b)=>(b.date||"").localeCompare(a.date||"")||(b.createdAt||0)-(a.createdAt||0));
  const nbAttente=all.filter(c=>c.statut==="attente").length;
  const totalAttente=all.filter(c=>c.statut==="attente").reduce((a,c)=>a+(+c.total||0),0);

  el("content").innerHTML=`
  <div class="sec-head"><span class="sec-title">📦 Commandes</span>
  <button class="btn btn-blue btn-sm" onclick="openNouvelleCommande()">+ Nouvelle</button></div>

  ${nbAttente>0?`<div class="card" style="border-color:#f59e0b55;background:#f59e0b10">
  <div style="display:flex;justify-content:space-between;align-items:center">
  <div><div style="font-weight:800;font-size:13px">⏳ ${nbAttente} commande(s) en attente</div>
  <div style="font-size:11px;color:var(--muted);margin-top:2px">Total à confirmer : ${cfa(totalAttente)}</div></div>
  </div></div>`:""}

  ${all.length===0?`<div class="empty"><div class="empty-emoji">📭</div>Aucune commande.</div>`:all.map(commandeCardHtml).join("")}
  `;
}

function commandeCardHtml(c){
  const items=c.items||[];
  return `<div class="commande-card">
  <div class="commande-head">
    <div><div class="commande-client">${c.client||"Client"}</div>
    <div class="commande-meta">📅 ${dateLabel(c.date)}${c.tel?" · 📞 "+c.tel:""}</div>
    ${c.adresse?`<div class="commande-meta">📍 ${c.adresse}</div>`:""}</div>
    ${tag(STATUT_LABEL[c.statut]||c.statut,STATUT_COLOR[c.statut]||"blue")}
  </div>
  ${items.map(it=>`<div class="commande-item"><span>${it.productName} × ${it.qty}</span><span style="font-family:monospace">${cfa((it.prix||0)*(it.qty||0))}</span></div>`).join("")}
  <div class="commande-total"><span>Total</span><span>${cfa(c.total)}</span></div>
  ${c.note?`<div style="font-size:11px;color:var(--muted);margin-top:6px;font-style:italic">📝 ${c.note}</div>`:""}
  <div class="commande-actions">
  ${c.statut==="attente"?`
    <button class="btn btn-green btn-sm" style="flex:1" onclick="marquerCommande('${c._key}','paye')">✅ Payé</button>
    <button class="btn btn-blue btn-sm" style="flex:1" onclick="marquerCommande('${c._key}','credit')">💳 Crédit</button>
    <button class="btn btn-red btn-sm" style="flex:1" onclick="marquerCommande('${c._key}','retour')">↩ Retour</button>
  `:`
    ${role==="admin"?`<button class="btn btn-ghost btn-sm" style="flex:1" onclick="annulerCommande('${c._key}')">↩ Annuler statut</button>`:""}
  `}
  ${role==="admin"?`<button class="btn btn-red btn-sm" style="padding:6px 12px" onclick="supprimerCommande('${c._key}')">✕</button>`:""}
  </div>
  </div>`;
}

// ---- Nouvelle commande modal ----
function openNouvelleCommande(){
  currentCommande={date:todayStr(),client:"",tel:"",adresse:"",note:"",items:[{productId:"",qty:1,prix:0}]};
  showModal("modal-commande","📦 Nouvelle commande",`
  <div class="field"><label>Date</label><input type="date" id="cmd-date" value="${currentCommande.date}" oninput="currentCommande.date=this.value"/></div>
  <div class="field"><label>Client</label><input type="text" id="cmd-client" placeholder="Nom du client" oninput="currentCommande.client=this.value"/></div>
  <div class="grid2">
  <div class="field"><label>Téléphone</label><input type="tel" id="cmd-tel" placeholder="ex: 07 00 00 00 00" oninput="currentCommande.tel=this.value"/></div>
  <div class="field"><label>Adresse</label><input type="text" id="cmd-adresse" placeholder="Quartier / adresse" oninput="currentCommande.adresse=this.value"/></div>
  </div>
  <div class="field"><label>Note (optionnel)</label><input type="text" id="cmd-note" placeholder="ex: appeler avant livraison" oninput="currentCommande.note=this.value"/></div>
  <div id="cmd-lignes-container"></div>
  <button class="btn btn-ghost btn-full" style="margin-top:4px" onclick="addCommandeLigne()">+ Ajouter un produit</button>
  `,
  `<button class="btn btn-ghost" style="flex:1" onclick="closeAndRemove('modal-commande')">Annuler</button>
   <button class="btn btn-blue" style="flex:2" onclick="saveCommande()">💾 Enregistrer</button>`);
  renderCommandeLignes();
}

// ---- Marquer payé / crédit / retour ----
async function marquerCommande(key,statut){
  const c=getCommandes().find(c=>c._key===key);if(!c)return;
  if(statut==="retour"){
    if(!confirm("Marquer cette commande comme RETOUR (annulée) ?"))return;
    await set(ref(db,"commandes/"+key),{...c,statut:"retour"});
    render();return;
  }
  // Vérifier le stock
  for(const it of c.items){
    const p=getP(it.productId);
    if(!p||it.qty>p.stock)return alert(`⚠️ Stock insuffisant pour "${it.productName}" (stock: ${p?p.stock:0}, besoin: ${it.qty})`);
  }
  if(!confirm(statut==="paye"?`Confirmer le PAIEMENT de ${cfa(c.total)} ?\nLe stock sera déduit et l'argent ajouté en caisse.`:`Confirmer cette commande à CRÉDIT ?\nLe stock sera déduit et un crédit client sera créé.`))return;
  // Déduire le stock + calculer le bénéfice
  let profit=0;
  for(const it of c.items){
    const p=getP(it.productId);
    profit+=((+it.prix||0)-(+p.prixAchat||0))*it.qty;
    await set(ref(db,"products/"+p.id),{...p,stock:p.stock-it.qty});
  }
  if(statut==="paye"){
    const mk=push(ref(db,"caisseMoves")).key;
    await set(ref(db,"caisseMoves/"+mk),{_key:mk,date:c.date,type:"in",label:"Commande: "+c.client,montant:c.total,commandeId:key});
  }else{
    // Crédit : fusion par nom de client
    const nom=c.client.trim().toLowerCase();
    const doublon=getCredits().find(cr=>cr.status!=="soldé"&&cr.client&&cr.client.trim().toLowerCase()===nom);
    if(doublon){
      await set(ref(db,"credits/"+doublon._key),{...doublon,montantInitial:(+doublon.montantInitial||0)+c.total,montantRestant:(+doublon.montantRestant||0)+c.total,historique:[...(doublon.historique||[]),{date:c.date,montant:c.total,note:"Commande livrée",commandeId:key}]});
    }else{
      const ck=push(ref(db,"credits")).key;
      await set(ref(db,"credits/"+ck),{_key:ck,client:c.client,montantInitial:c.total,montantRestant:c.total,date:c.date,status:"en cours",historique:[{date:c.date,montant:c.total,note:"Commande livrée",commandeId:key}]});
    }
  }
  await set(ref(db,"commandes/"+key),{...c,statut,profit});
  render();
}
window.marquerCommande=marquerCommande;

// ---- Annuler statut (admin) ----
async function annulerCommande(key){
  const c=getCommandes().find(c=>c._key===key);if(!c)return;
  if(!confirm("Annuler le statut \""+(STATUT_LABEL[c.statut]||c.statut)+"\" et repasser en attente ?\n⚠️ Le stock et la caisse/crédit seront ajustés."))return;
  await reverserCommande(c);
  await set(ref(db,"commandes/"+key),{...c,statut:"attente",profit:0});
  render();
}
window.annulerCommande=annulerCommande;

async function reverserCommande(c){
  if(c.statut==="paye"||c.statut==="credit"){
    // Restituer le stock
    for(const it of c.items){
      const p=getP(it.productId);
      if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+it.qty});
    }
  }
  if(c.statut==="paye"){
    const m=getCaisseMoves().find(m=>m.commandeId===c._key);
    if(m)await remove(ref(db,"caisseMoves/"+m._key));
  }
  if(c.statut==="credit"){
    const cred=getCredits().find(cr=>(cr.historique||[]).some(h=>h.commandeId===c._key));
    if(cred){
      const h=cred.historique.find(h=>h.commandeId===c._key);
      const newHistorique=cred.historique.filter(h=>h.commandeId!==c._key);
      const newInitial=Math.max(0,(+cred.montantInitial||0)-(+h.montant||0));
      const newRestant=Math.max(0,(+cred.montantRestant||0)-(+h.montant||0));
      await set(ref(db,"credits/"+cred._key),{...cred,montantInitial:newInitial,montantRestant:newRestant,historique:newHistorique});
    }
  }
}

// ---- Supprimer commande (admin) ----
async function supprimerCommande(key){
  const c=getCommandes().find(c=>c._key===key);if(!c)return;
  if(!confirm("Supprimer définitivement cette commande ?"+((c.statut==="paye"||c.statut==="credit")?"\n⚠️ Le stock et la caisse/crédit seront ajustés.":"")))return;
  if(c.statut==="paye"||c.statut==="credit")await reverserCommande(c);
  await remove(ref(db,"commandes/"+key));
  render();
}
window.supprimerCommande=supprimerCommande;

function renderCaisse(){
  const moves=getCaisseMoves();
  const soldeDepart=+(fbCaisseConfig.soldeDepart||0);
  const totalIn=moves.filter(m=>m.type==="in").reduce((a,m)=>a+(+m.montant||0),0);
  const totalOut=moves.filter(m=>m.type==="out").reduce((a,m)=>a+(+m.montant||0),0);
  const solde=soldeDepart+totalIn-totalOut;

  // Grouper par date
  const byDate={};
  moves.forEach(m=>{(byDate[m.date]=byDate[m.date]||[]).push(m);});
  const sortedDates=Object.keys(byDate).sort((a,b)=>b.localeCompare(a));
  const sortedAsc=[...sortedDates].sort((a,b)=>a.localeCompare(b));
  const soldeFin={};let cumul=soldeDepart;
  sortedAsc.forEach(d=>{
    const dayIn=byDate[d].filter(m=>m.type==="in").reduce((a,m)=>a+(+m.montant||0),0);
    const dayOut=byDate[d].filter(m=>m.type==="out").reduce((a,m)=>a+(+m.montant||0),0);
    cumul+=dayIn-dayOut;soldeFin[d]=cumul;
  });

  el("content").innerHTML=`
  <div class="sec-head"><span class="sec-title">🏦 Caisse</span>
  <div style="display:flex;gap:6px">
  <button class="btn btn-green btn-sm" onclick="openCaisseMove('in')">+ Apport</button>
  <button class="btn btn-red btn-sm" onclick="openCaisseMove('out')">- Retrait</button>
  </div></div>

  <div class="card" style="text-align:center;border-color:#22c55e44">
  <div class="stat-label">💰 Solde actuel</div>
  <div style="font-size:34px;font-weight:900;font-family:monospace;color:${solde>=0?"var(--green)":"var(--red)"}">${cfa(solde)}</div>
  <div style="font-size:11px;color:var(--muted);margin-top:6px">Solde départ: ${cfa(soldeDepart)}</div>
  </div>

  <div class="grid2" style="margin-top:12px">
  <div class="stat-box"><div class="stat-label">📥 Total entrées</div><div class="stat-val" style="color:var(--green)">${cfa(totalIn)}</div></div>
  <div class="stat-box"><div class="stat-label">📤 Total sorties</div><div class="stat-val" style="color:var(--red)">${cfa(totalOut)}</div></div>
  </div>

  <div class="sec-head" style="margin-top:18px"><span class="sec-title" style="font-size:15px">📅 Historique journalier</span></div>
  ${sortedDates.length===0?`<div class="empty"><div class="empty-emoji">📭</div>Aucune transaction.</div>`:
  sortedDates.map(d=>{
    const dm=byDate[d];
    const dayIn=dm.filter(m=>m.type==="in").reduce((a,m)=>a+(+m.montant||0),0);
    const dayOut=dm.filter(m=>m.type==="out").reduce((a,m)=>a+(+m.montant||0),0);
    const net=dayIn-dayOut;
    return `<div class="card">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
    <span style="font-weight:800;font-size:14px">${dateLabel(d)}</span>
    <span style="font-family:monospace;font-weight:800;color:${net>=0?"var(--green)":"var(--red)"}">${net>=0?"+":""}${cfa(net)}</span>
    </div>
    ${dm.map(m=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
    <span>${m.type==="in"?"📥":"📤"} ${m.label}${role==="admin"?` <button onclick="deleteCaisseMove('${m._key}')" style="background:none;border:none;color:var(--red);cursor:pointer;font-size:11px;margin-left:4px">✕</button>`:""}</span>
    <span style="font-family:monospace;color:${m.type==="in"?"var(--green)":"var(--red)"}">${m.type==="in"?"+":"-"}${cfa(m.montant)}</span>
    </div>`).join("")}
    <div style="display:flex;justify-content:space-between;align-items:center;padding-top:8px;margin-top:4px;border-top:2px solid var(--border)">
    <span style="font-size:11px;font-weight:700;color:var(--muted)">💰 Solde fin de journée</span>
    <span style="font-family:monospace;font-weight:800;font-size:13px;color:${soldeFin[d]>=0?"var(--green)":"var(--red)"}">${cfa(soldeFin[d])}</span>
    </div>
    </div>`;
  }).join("")}
  `;
}

// ---- Validation / annulation des effets d'un rapport ----
async function reverserRapport(rapport){
  for(const v of (rapport.ventes||[])){
    if(v.productId){const p=getP(v.productId);if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+(+v.qty||0)});}
  }
  const mv=getCaisseMoves().find(m=>m.rapportId===rapport._key);
  if(mv)await remove(ref(db,"caisseMoves/"+mv._key));
}

async function validerRapportDirect(){
  for(const v of currentRapportVentes){
    if(!v.productId)return alert("⚠️ Sélectionne un produit pour chaque ligne !");
    if(!v.qty||v.qty<1)return alert("⚠️ Quantité invalide !");
  }
  // Vérifier le stock disponible (en tenant compte des lignes multiples du même produit)
  const stockMap={};
  for(const v of currentRapportVentes){
    const p=getP(v.productId);
    if(stockMap[v.productId]===undefined)stockMap[v.productId]=p?p.stock:0;
    stockMap[v.productId]-=(+v.qty||0);
    if(stockMap[v.productId]<0)return alert(`⚠️ Stock insuffisant pour "${p?p.name:v.productName}"`);
  }
  if(!confirm("Valider ce rapport ?\nLe stock sera déduit et la caisse mise à jour."))return;

  // Si on édite un rapport existant, annuler ses effets précédents
  if(editingRapportId){
    const old=getRapports().find(r=>r._key===editingRapportId);
    if(old)await reverserRapport(old);
  }else{
    // Si un rapport (non vide) existe déjà pour cette date sans être en édition, on le remplace
    const existing=getRapports().find(r=>r.date===rapportDate);
    if(existing){
      if(!confirm("⚠️ Un rapport existe déjà pour le "+dateLabel(rapportDate)+" !\nLe remplacer ?"))return;
      await reverserRapport(existing);
      editingRapportId=existing._key;
    }
  }

  const ventes=[];
  let total=0;
  for(const v of currentRapportVentes){
    const p=getP(v.productId);
    const profit=((+v.price||0)-(+p.prixAchat||0))*(+v.qty||0);
    ventes.push({productId:v.productId,productName:p.name,qty:+v.qty,price:+v.price,profit,client:(v.client||"").trim()});
    total+=(+v.price||0)*(+v.qty||0);
    await set(ref(db,"products/"+p.id),{...p,stock:p.stock-(+v.qty||0)});
  }
  const k=editingRapportId||push(ref(db,"rapports")).key;
  await set(ref(db,"rapports/"+k),{_key:k,date:rapportDate,ventes,source:editingRapportId&&getRapports().find(r=>r._key===editingRapportId)?.source==="scan"?"scan":"manual",createdAt:Date.now()});
  if(total>0){
    const mk=push(ref(db,"caisseMoves")).key;
    await set(ref(db,"caisseMoves/"+mk),{_key:mk,date:rapportDate,type:"in",label:"Ventes comptoir",montant:total,rapportId:k});
  }
  rapportMode="view";currentRapportVentes=[];editingRapportId=null;
  render();
}
window.validerRapportDirect=validerRapportDirect;

function editRapportDirect(key){
  const r=getRapports().find(r=>r._key===key);if(!r)return;
  if(r.source==="zero"){currentRapportVentes=[{productId:"",qty:1,price:0,client:""}];}
  else currentRapportVentes=(r.ventes||[]).map(v=>({productId:v.productId,productName:v.productName,qty:v.qty,price:v.price,client:v.client||""}));

async function handlePhoto(event){
  const file=event.target.files[0];
  if(!file)return;
  if(GEMINI_API_KEY==="VOTRE_CLE_GEMINI"){alert("⚠️ Configure d'abord ta clé Gemini dans le code (voir commentaires en haut du fichier).");event.target.value="";return;}
  const reader=new FileReader();
  reader.onload=async()=>{
    const base64=reader.result.split(",")[1];
    const productList=getProducts().map(p=>`${p.id}: ${p.name} (prix vente: ${p.prixVente})`).join("\n");
    const prompt=`Analyse cette photo d'un cahier de ventes de parfums écrit à la main. Liste des produits existants (id: nom) :\n${productList}\n\nPour chaque ligne de vente identifiée sur la photo, retourne un objet avec : productId (l'id exact de la liste ci-dessus si le produit correspond, sinon null), productName (le nom tel qu'écrit sur le cahier), qty (quantité, nombre entier), price (prix unitaire en F CFA, nombre), client (nom du client si mentionné sur le cahier, sinon chaîne vide).\n\nRéponds UNIQUEMENT avec un JSON valide, sans texte autour, sans \`\`\`, au format exact :\n{"ventes":[{"productId":"...","productName":"...","qty":1,"price":0,"client":""}],"notes":""}`;
    el("content").insertAdjacentHTML("afterbegin",`<div class="card" id="scan-loading" style="text-align:center;border-color:#8b5cf655"><div style="font-size:28px">⏳</div><div style="font-weight:800;margin-top:6px">Analyse de la photo en cours...</div></div>`);
    try{
      const resp=await fetch(GEMINI_URL,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({contents:[{parts:[{text:prompt},{inline_data:{mime_type:file.type,data:base64}}]}]})});
      const data=await resp.json();
      let text=data?.candidates?.[0]?.content?.parts?.map(p=>p.text||"").join("")||"";
      text=text.replace(/```json|```/g,"").trim();
      const parsed=JSON.parse(text);
      el("scan-loading")?.remove();
      if(parsed.ventes&&parsed.ventes.length>0){
        currentRapportVentes=parsed.ventes.map(v=>{
          const p=v.productId?getP(String(v.productId)):null;
          return{productId:p?p.id:"",productName:v.productName||(p?p.name:""),qty:Math.max(1,+v.qty||1),price:p?+p.prixVente||+v.price||0:+v.price||0,client:(v.client||"").trim()};
        });
        editingRapportId=null;
        rapportMode="manual";
        if(parsed.notes&&parsed.notes.trim())alert("📝 Note IA: "+parsed.notes);
        render();
      }else{
        alert("⚠️ Aucune vente détectée sur la photo.\nVérifie que le cahier est bien lisible et bien éclairé, puis réessaie.");
      }
    }catch(e){
      el("scan-loading")?.remove();
      console.error(e);
      alert("❌ Erreur lors de l'analyse de la photo : "+e.message);
    }
  };
  reader.readAsDataURL(file);
  event.target.value="";
}
window.handlePhoto=handlePhoto;

function setAchatFilter(f){achatFilter=f;renderAchats();}
window.setAchatFilter=setAchatFilter;

function achatCardHtml(a){

  <div class="field" style="margin-top:10px"><label>Frais de livraison (F)</label><input type="number" id="achat-frais" min="0" value="0" onchange="currentAchat.fraisLivraison=+this.value;renderAchatLignes()"/></div>

window.openNouvelAchat=openNouvelAchat;

function renderAchatLignes(){
  const c=el("achat-lignes-container");if(!c)return;
  const totalProduits=currentAchat.items.reduce((a,it)=>a+(+it.qty||0)*(+it.prixUnitaire||0),0);
  const total=totalProduits+(+currentAchat.fraisLivraison||0);
  c.innerHTML=currentAchat.items.map((it,i)=>{
    return `<div class="cmd-line">
    <div class="cmd-line-head"><span style="font-size:11px;font-weight:800;color:var(--muted)">Produit #${i+1}</span>
    ${currentAchat.items.length>1?`<button class="btn btn-red btn-sm" onclick="removeAchatLigne(${i})">✕</button>`:""}</div>
    <div class="field" style="margin-bottom:8px"><select onchange="updateAchatLigne(${i},'productId',this.value)">
    <option value="">— Choisir un produit —</option>
    <option value="__nouveau__" ${it.productId==="__nouveau__"?"selected":""}>➕ Nouveau produit</option>
    ${getProducts().map(p=>`<option value="${p.id}" ${it.productId===p.id?"selected":""}>${p.name} (stock: ${p.stock})</option>`).join("")}
    </select></div>
    ${it.productId==="__nouveau__"?`<div class="field" style="margin-bottom:8px"><label>Nom du nouveau produit</label><input type="text" value="${it.newName||""}" placeholder="ex: Bleu de Chanel 100ml" onchange="updateAchatLigne(${i},'newName',this.value)"/></div>`:""}
    <div class="grid2">
    <div class="field"><label>Quantité</label><input type="number" min="1" value="${it.qty}" onchange="updateAchatLigne(${i},'qty',+this.value)"/></div>
    <div class="field"><label>Prix d'achat unitaire (F)</label><input type="number" min="0" value="${it.prixUnitaire}" onchange="updateAchatLigne(${i},'prixUnitaire',+this.value)"/></div>
    </div>
    <div style="font-size:11px;color:var(--muted)">Sous-total: ${cfa((it.qty||0)*(it.prixUnitaire||0))}</div>
    </div>`;
  }).join("")+`<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 0 4px;border-top:2px solid var(--border);margin-top:6px">
  <span style="font-weight:900;font-size:15px">Total (frais inclus)</span>
  <span style="font-weight:900;font-size:18px;font-family:monospace;color:var(--amber)">${cfa(total)}</span>
  </div>`;
}
function addAchatLigne(){currentAchat.items.push({productId:"",qty:1,prixUnitaire:0,newName:""});renderAchatLignes();}
window.addAchatLigne=addAchatLigne;
function removeAchatLigne(i){currentAchat.items.splice(i,1);renderAchatLignes();}
window.removeAchatLigne=removeAchatLigne;
function updateAchatLigne(i,field,val){
  currentAchat.items[i][field]=val;
  if(field==="productId"&&val!=="__nouveau__"){
    const p=getP(val);
    if(p){currentAchat.items[i].productName=p.name;currentAchat.items[i].prixUnitaire=+p.prixAchat||0;}
  }
  renderAchatLignes();
}
window.updateAchatLigne=updateAchatLigne;

async function saveAchat(){
  const a=currentAchat;
  if(!a.fournisseur.trim())return alert("⚠️ Indique le nom du fournisseur !");
  for(const it of a.items){
    if(!it.productId)return alert("⚠️ Choisis un produit pour chaque ligne !");
    if(it.productId==="__nouveau__"&&!(it.newName||"").trim())return alert("⚠️ Indique le nom du nouveau produit !");
    if(!it.qty||it.qty<1)return alert("⚠️ Quantité invalide !");
  }
  const items=a.items.map(it=>{
    if(it.productId==="__nouveau__")return{productId:null,productName:it.newName.trim(),qty:+it.qty,prixUnitaire:+it.prixUnitaire};
    const p=getP(it.productId);return{productId:it.productId,productName:p?p.name:it.productName,qty:+it.qty,prixUnitaire:+it.prixUnitaire};
  });
  const totalProduits=items.reduce((a,it)=>a+it.qty*it.prixUnitaire,0);
  const total=totalProduits+(+a.fraisLivraison||0);
  const k=push(ref(db,"achats")).key;
  await set(ref(db,"achats/"+k),{_key:k,date:a.date,fournisseur:a.fournisseur.trim(),items,fraisLivraison:+a.fraisLivraison||0,total,statut:"attente",createdAt:Date.now()});
  closeAndRemove("modal-achat");
  achatFilter="attente";
  render();
}
window.saveAchat=saveAchat;

async function marquerAchatRecu(key){
  const a=getAchats().find(a=>a._key===key);if(!a)return;
  if(!confirm("Marquer cet achat comme REÇU ?\nLe stock sera augmenté et les prix d'achat mis à jour (frais de livraison répartis)."))return;
  const totalQty=a.items.reduce((s,it)=>s+(+it.qty||0),0);
  const fraisParUnite=totalQty>0?(+a.fraisLivraison||0)/totalQty:0;
  for(const it of a.items){
    const coutUnitaire=(+it.prixUnitaire||0)+fraisParUnite;
    if(it.productId){
      const p=getP(it.productId);
      if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+it.qty,prixAchat:Math.round(coutUnitaire)});
    }else{
      const nk=push(ref(db,"products")).key;
      await set(ref(db,"products/"+nk),{name:it.productName,prixAchat:Math.round(coutUnitaire),prixVente:0,stock:it.qty});
    }
  }
  await set(ref(db,"achats/"+key),{...a,statut:"recu"});
  render();
}
window.marquerAchatRecu=marquerAchatRecu;

async function annulerAchat(key){
  const a=getAchats().find(a=>a._key===key);if(!a)return;
  if(!confirm("Annuler la réception ?\n⚠️ Le stock sera réduit en conséquence."))return;
  for(const it of a.items){
    if(it.productId){
      const p=getP(it.productId);
      if(p)await set(ref(db,"products/"+p.id),{...p,stock:Math.max(0,p.stock-it.qty)});
    }
  }
  await set(ref(db,"achats/"+key),{...a,statut:"attente"});
  render();
}
window.annulerAchat=annulerAchat;

async function supprimerAchat(key){
  const a=getAchats().find(a=>a._key===key);if(!a)return;
  if(!confirm("Supprimer cet achat ?"+(a.statut==="recu"?"\n⚠️ Le stock sera réduit en conséquence.":"")))return;
  if(a.statut==="recu"){
    for(const it of a.items){
      if(it.productId){const p=getP(it.productId);if(p)await set(ref(db,"products/"+p.id),{...p,stock:Math.max(0,p.stock-it.qty)});}
    }
  }
  await remove(ref(db,"achats/"+key));
  render();
}
window.supprimerAchat=supprimerAchat;

  ${prixU?`<div style="background:${resteAPercevoir>0?"#ef444420":"#22c55e14"};border:1px solid ${resteAPercevoir>0?"#ef444455":"#22c55e33"};border-radius:10px;padding:11px 14px">
  <div style="display:flex;justify-content:space-between;align-items:center">
  <span style="font-size:10px;font-weight:700;color:var(--muted);text-transform:uppercase">💰 Reste à percevoir</span>
  <span style="font-family:monospace;font-weight:800;font-size:15px;color:${resteAPercevoir>0?"var(--red)":"var(--green)"}">${resteAPercevoir>0?cfa(resteAPercevoir):"✅ Tout reçu"}</span>
  </div></div>`:""}
  <div style="display:flex;gap:8px;margin-top:10px;flex-wrap:wrap">

  <button class="btn btn-amber btn-sm" style="flex:1" onclick="openDepotAction('${d._key}','retour')">↩ Retour stock</button>

  ${role==="admin"?`<button class="btn btn-red btn-sm" onclick="deleteDepot('${d._key}')">✕</button>`:""}
  </div>
  <div id="depot-action-${d._key}"></div>
  ${(d.historique||[]).length?`<div style="margin-top:10px"><div style="font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;margin-bottom:6px">Historique</div>

  <span style="color:var(--muted)">${dateLabel(h.date)} · ${h.label}</span>
  <div style="display:flex;align-items:center;gap:6px"><span style="font-family:monospace;color:${h.montant>=0?"var(--green)":"var(--amber)"}">${h.montant?(h.montant>=0?"+"+cfa(h.montant):cfa(h.montant)):""}</span>

  </div>`).join("")}

}
window.openAddDepot=openAddDepot;

async function saveAddDepot(){
  const lieu=el("depot-lieu").value.trim();
  const productId=el("depot-produit").value;
  const qty=+el("depot-qty").value;
  const prixEstime=+el("depot-prix").value;
  const date=el("depot-date").value;
  if(!lieu)return alert("⚠️ Indique le lieu/partenaire !");
  const p=getP(productId);if(!p)return alert("⚠️ Choisis un produit !");
  if(!qty||qty<1)return alert("⚠️ Quantité invalide !");
  if(qty>p.stock)return alert(`⚠️ Stock insuffisant (stock: ${p.stock})`);
  await set(ref(db,"products/"+p.id),{...p,stock:p.stock-qty});
  const k=push(ref(db,"depots")).key;
  await set(ref(db,"depots/"+k),{_key:k,lieu,productId:p.id,productName:p.name,prixAchat:p.prixAchat,prixEstime,qtyDeposited:qty,qtySold:0,qtyReturned:0,date,status:"open",versements:[],historique:[]});

window.saveAddDepot=saveAddDepot;

function openDepotAction(key,type){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const c=el("depot-action-"+key);if(!c)return;
  const prixU=+d.prixEstime||0;
  if(type==="versement"){
    const qtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));
    c.innerHTML=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-top:8px">
    <div style="font-weight:800;font-size:12px;margin-bottom:8px">💰 Versement — ${d.lieu}</div>
    <div class="field"><label>Unités vendues</label><input type="number" id="dv-qty-${key}" min="0" max="${qtyRestant}" placeholder="ex: 4" oninput="calcVersementMontant('${key}')"/></div>
    <div class="field"><label>Montant versé (F)</label><input type="number" id="dv-montant-${key}" min="0" placeholder="ex: 35000"/></div>
    <div class="field"><label>Date</label><input type="date" id="dv-date-${key}" value="${todayStr()}"/></div>
    <button class="btn btn-green btn-full" onclick="saveVersement('${key}')">✅ Enregistrer le versement</button>
    </div>`;
  }else if(type==="retour"){
    const qtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));
    c.innerHTML=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-top:8px">
    <div style="font-weight:800;font-size:12px;margin-bottom:8px">↩ Retour stock — ${d.lieu}</div>
    <div class="field"><label>Unités retournées (max ${qtyRestant})</label><input type="number" id="dr-qty-${key}" min="0" max="${qtyRestant}" value="${qtyRestant}"/></div>
    <button class="btn btn-amber btn-full" onclick="saveRetourDepot('${key}')">↩ Récupérer le stock</button>
    </div>`;
  }else if(type==="reappro"){
    c.innerHTML=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-top:8px">
    <div style="font-weight:800;font-size:12px;margin-bottom:8px">📦 Ajouter du stock — ${d.lieu}</div>
    <div class="field"><label>Quantité à ajouter</label><input type="number" id="da-qty-${key}" min="1" placeholder="ex: 5"/></div>
    <div class="field"><label>Date</label><input type="date" id="da-date-${key}" value="${todayStr()}"/></div>
    <button class="btn btn-amber btn-full" onclick="saveAddStockDepot('${key}')">📦 Ajouter</button>
    </div>`;
  }else if(type==="corriger"){
    const totalVerse=(d.versements||[]).reduce((a,v)=>a+(+v.montant||0),0);
    const resteActuel=Math.max(0,(+d.qtySold||0)*prixU-totalVerse);
    c.innerHTML=`<div style="background:var(--bg);border-radius:10px;padding:12px;margin-top:8px">
    <div style="font-weight:800;font-size:12px;margin-bottom:8px">✎ Corriger le reste à percevoir</div>

    <div class="field"><label>Nouveau reste à percevoir (F)</label><input type="number" id="dc-reste-${key}" value="${resteActuel}" min="0"/></div>
    <button class="btn btn-amber btn-full" onclick="saveCorrigerDepot('${key}')">✎ Corriger</button>
    </div>`;
  }
}
window.openDepotAction=openDepotAction;

function calcVersementMontant(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const qty=+el("dv-qty-"+key).value||0;
  const montantEl=el("dv-montant-"+key);
  if(montantEl)montantEl.value=Math.round(qty*(+d.prixEstime||0));
}
window.calcVersementMontant=calcVersementMontant;

async function saveVersement(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const qty=+el("dv-qty-"+key).value||0;
  const montant=+el("dv-montant-"+key).value||0;
  const date=el("dv-date-"+key).value;
  const qtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));
  if(qty<0||qty>qtyRestant)return alert("⚠️ Quantité invalide (max "+qtyRestant+")");
  if(!date)return alert("⚠️ Date obligatoire !");
  await set(ref(db,"depots/"+key),{...d,qtySold:(+d.qtySold||0)+qty,versements:[...(d.versements||[]),{date,montant}],historique:[...(d.historique||[]),{date,label:"Versement · "+qty+" vendus",montant}]});
  if(montant>0){
    const mk=push(ref(db,"caisseMoves")).key;
    await set(ref(db,"caisseMoves/"+mk),{_key:mk,date,type:"in",label:"Versement dépôt: "+d.lieu,montant});
  }
  render();
}
window.saveVersement=saveVersement;

async function saveRetourDepot(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const qty=+el("dr-qty-"+key).value||0;
  const qtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));
  if(qty<=0||qty>qtyRestant)return alert("⚠️ Quantité invalide (max "+qtyRestant+")");
  const p=getP(d.productId);
  if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+qty});
  const newQtyReturned=(+d.qtyReturned||0)+qty;
  const newQtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-newQtyReturned);
  await set(ref(db,"depots/"+key),{...d,qtyReturned:newQtyReturned,status:newQtyRestant<=0?"closed":d.status,historique:[...(d.historique||[]),{date:todayStr(),label:"Retour stock · "+qty+" unités",montant:0}]});
  render();
}
window.saveRetourDepot=saveRetourDepot;

async function saveAddStockDepot(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const qty=+el("da-qty-"+key).value||0;
  const date=el("da-date-"+key).value;
  if(!qty||qty<1)return alert("⚠️ Quantité invalide !");
  const p=getP(d.productId);
  if(p&&qty>p.stock)return alert("⚠️ Stock insuffisant (stock: "+p.stock+")");
  if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock-qty});
  await set(ref(db,"depots/"+key),{...d,qtyDeposited:(+d.qtyDeposited||0)+qty,status:"open",historique:[...(d.historique||[]),{date,label:"Stock ajouté · "+qty+" unités",montant:0,addedQty:qty}]});
  render();
}
window.saveAddStockDepot=saveAddStockDepot;

async function saveCorrigerDepot(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const reste=+el("dc-reste-"+key).value;
  if(isNaN(reste)||reste<0)return alert("⚠️ Valeur invalide !");
  const prixU=+d.prixEstime||0;
  const totalVerse=(d.versements||[]).reduce((a,v)=>a+(+v.montant||0),0);
  const newQtySold=prixU>0?Math.round((reste+totalVerse)/prixU):d.qtySold;
  await set(ref(db,"depots/"+key),{...d,qtySold:Math.max(0,Math.min(+d.qtyDeposited||0,newQtySold))});
  render();
}
window.saveCorrigerDepot=saveCorrigerDepot;

async function deleteDepotHistorique(depotKey,index){
  const d=getDepots().find(d=>d._key===depotKey);if(!d)return;
  const h=(d.historique||[])[index];if(!h)return;
  if(!confirm("Supprimer cette ligne ?\n⚠️ Les compteurs seront ajustés."))return;
  let patch={};
  if(h.addedQty){
    // c'était un "Stock ajouté" -> décrémenter qtyDeposited + restituer le stock produit
    patch.qtyDeposited=Math.max(0,(+d.qtyDeposited||0)-h.addedQty);
    const p=getP(d.productId);
    if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+h.addedQty});
  }
  const newHistorique=(d.historique||[]).filter((_,i)=>i!==index);
  await set(ref(db,"depots/"+depotKey),{...d,...patch,historique:newHistorique});
  render();
}
window.deleteDepotHistorique=deleteDepotHistorique;

async function deleteDepot(key){
  const d=getDepots().find(d=>d._key===key);if(!d)return;
  const qtyRestant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));
  if(!confirm("Supprimer ce dépôt ?"+(qtyRestant>0?`\n⚠️ ${qtyRestant} unités seront restituées au stock.`:"")))return;
  if(qtyRestant>0){
    const p=getP(d.productId);
    if(p)await set(ref(db,"products/"+p.id),{...p,stock:p.stock+qtyRestant});
  }
  await remove(ref(db,"depots/"+key));
  render();
}
window.deleteDepot=deleteDepot;

  <button class="btn btn-red btn-sm" onclick="openAddDepense()">+ Dépense</button></div>

  ${["Hadi","Youssef"].map(assoc=>retraitsBlockHtml(assoc)).join("")}

  ${moisList.map(mk=>{
    const depMois=getDepenses().filter(d=>d.mois===mk).sort((a,b)=>(a.date||"").localeCompare(b.date||""));
    const totalDep=depMois.reduce((a,d)=>a+(+d.montant||0),0);
    const ventes=getCommandes().filter(c=>monthKey(c.date)===mk&&(c.statut==="paye"||c.statut==="credit"));

    const benefNet=benefBrut-totalDep;
    return `<div class="card">
    <div style="font-weight:900;font-size:14px;margin-bottom:8px">${MOIS[+mk.slice(5,7)-1]} ${mk.slice(0,4)}</div>
    ${depMois.length===0?`<div style="font-size:12px;color:var(--muted);padding:6px 0">Aucune dépense ce mois.</div>`:
    depMois.map(d=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
    <div><span>${d.cat}</span>${d.note?` · <span style="color:var(--muted)">${d.note}</span>`:""}<div style="font-size:10px;color:var(--muted)">${d.date}</div></div>
    <div style="display:flex;align-items:center;gap:6px"><span style="font-family:monospace;color:var(--red)">-${cfa(d.montant)}</span>
    ${role==="admin"?`<button onclick="deleteDepense('${d._key}')" style="background:#ef444422;border:1px solid #ef444444;color:var(--red);border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer;font-weight:700">✕</button>`:""}</div>
    </div>`).join("")}
    <div style="background:var(--bg);border-radius:9px;padding:10px 12px;margin-top:8px">
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:var(--muted)">Bénéfice brut</span><span style="font-family:monospace;font-size:12px;color:var(--green)">+${cfa(benefBrut)}</span></div>
    <div style="display:flex;justify-content:space-between;margin-bottom:4px"><span style="font-size:11px;color:var(--muted)">Dépenses</span><span style="font-family:monospace;font-size:12px;color:var(--red)">-${cfa(totalDep)}</span></div>
    <div style="display:flex;justify-content:space-between;padding-top:6px;border-top:1px solid var(--border)"><span style="font-size:12px;font-weight:800">Bénéf. net réel</span><span style="font-family:monospace;font-weight:800;font-size:15px;color:${benefNet>=0?"var(--green)":"var(--red)"}">${benefNet>=0?"+":""}${cfa(benefNet)}</span></div>
    </div>
    </div>`;
  }).join("")}
  `;
}

function retraitsBlockHtml(assoc){
  const retraits=getRetraits().filter(r=>r.assoc===assoc&&!r.solde);
  const total=retraits.reduce((a,r)=>a+(+r.montant||0),0);
  const soldes=getRetraits().filter(r=>r.assoc===assoc&&r.solde);
  return `<div class="card">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px">
  <span style="font-weight:800;font-size:13px">💰 Retraits ${assoc}</span>
  <div style="display:flex;gap:6px;align-items:center">
  <span style="font-family:monospace;font-weight:800;font-size:14px;color:var(--amber)">${cfa(total)}</span>
  <button class="btn btn-amber btn-sm" onclick="openAddRetrait('${assoc}')">+</button>
  ${total>0?`<button class="btn btn-green btn-sm" onclick="solderRetraits('${assoc}')">✓ Solder</button>`:""}
  </div></div>
  ${retraits.length===0?`<div style="font-size:11px;color:var(--muted)">Aucun retrait en cours</div>`:
  retraits.sort((a,b)=>(a.date||"").localeCompare(b.date||"")).map(r=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:5px 0;border-bottom:1px solid var(--border);font-size:12px">
  <span style="color:var(--muted)">${r.date}</span>
  <div style="display:flex;align-items:center;gap:6px"><span style="font-family:monospace;color:var(--amber)">-${cfa(r.montant)}</span>
  ${role==="admin"?`<button onclick="deleteRetrait('${r._key}')" style="background:#ef444422;border:1px solid #ef444444;color:var(--red);border-radius:6px;padding:2px 7px;font-size:10px;cursor:pointer;font-weight:700">✕</button>`:""}</div>
  </div>`).join("")}
  ${soldes.length?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border);font-size:11px;color:var(--muted)">Soldés: ${cfa(soldes.reduce((a,r)=>a+(+r.montant||0),0))}</div>`:""}

function openAddDepense(){
  showModal("modal-depense","💸 Nouvelle dépense",`
  <div class="field"><label>Date</label><input type="date" id="dep-date" value="${todayStr()}"/></div>
  <div class="field"><label>Catégorie</label><input type="text" id="dep-cat" placeholder="ex: Transport, Loyer, Emballage..."/></div>
  <div class="field"><label>Montant (F)</label><input type="number" id="dep-montant" min="0" placeholder="ex: 5000"/></div>
  <div class="field"><label>Note (optionnel)</label><input type="text" id="dep-note" placeholder="détail"/></div>
  `,
  `<button class="btn btn-ghost" style="flex:1" onclick="closeAndRemove('modal-depense')">Annuler</button>

}
window.openAddDepense=openAddDepense;

async function saveDepense(){
  const date=el("dep-date").value;
  const cat=el("dep-cat").value.trim();
  const montant=+el("dep-montant").value;
  const note=el("dep-note").value.trim();
  if(!date||!cat||!montant)return alert("⚠️ Date, catégorie et montant obligatoires !");
  const k=push(ref(db,"depenses")).key;
  await set(ref(db,"depenses/"+k),{_key:k,date,mois:monthKey(date),cat,montant,note});
  closeAndRemove("modal-depense");
  render();
}
window.saveDepense=saveDepense;

async function deleteDepense(key){
  if(!confirm("Supprimer cette dépense ?"))return;
  await remove(ref(db,"depenses/"+key));
  render();
}
window.deleteDepense=deleteDepense;

function openAddRetrait(assoc){
  showModal("modal-retrait","💰 Retrait — "+assoc,`
  <div class="field"><label>Date</label><input type="date" id="ret-date" value="${todayStr()}"/></div>
  <div class="field"><label>Montant (F)</label><input type="number" id="ret-montant" min="0" placeholder="ex: 25000"/></div>
  `,
  `<button class="btn btn-ghost" style="flex:1" onclick="closeAndRemove('modal-retrait')">Annuler</button>
   <button class="btn btn-amber" style="flex:2" onclick="saveRetrait('${assoc}')">💾 Enregistrer</button>`);
}
window.openAddRetrait=openAddRetrait;

async function saveRetrait(assoc){
  const date=el("ret-date").value;
  const montant=+el("ret-montant").value;
  if(!date||!montant)return alert("⚠️ Date et montant obligatoires !");
  const k=push(ref(db,"retraits")).key;
  await set(ref(db,"retraits/"+k),{_key:k,date,mois:monthKey(date),assoc,montant,solde:false});
  closeAndRemove("modal-retrait");
  render();
}
window.saveRetrait=saveRetrait;

async function deleteRetrait(key){
  if(!confirm("Supprimer ce retrait ?"))return;
  await remove(ref(db,"retraits/"+key));
  render();
}
window.deleteRetrait=deleteRetrait;

async function solderRetraits(assoc){
  const retraits=getRetraits().filter(r=>r.assoc===assoc&&!r.solde);
  const total=retraits.reduce((a,r)=>a+(+r.montant||0),0);
  if(!confirm("Solder les retraits de "+assoc+" ?\nTotal: "+cfa(total)+"\nLe compteur repart à 0."))return;
  for(const r of retraits){await set(ref(db,"retraits/"+r._key),{...r,solde:true});}
  render();
}
window.solderRetraits=solderRetraits;

// ===================================================================
// DASHBOARD
// ===================================================================
function renderDashboard(){
  const mk=monthKey(todayStr());
  const ventes=getCommandes().filter(c=>monthKey(c.date)===mk&&(c.statut==="paye"||c.statut==="credit"));
  const rapportsMois=getRapports().filter(r=>monthKey(r.date)===mk);
  const caDirectMois=rapportsMois.reduce((a,r)=>a+(r.ventes||[]).reduce((s,v)=>s+(+v.price||0)*(+v.qty||0),0),0);
  const benefDirectMois=rapportsMois.reduce((a,r)=>a+(r.ventes||[]).reduce((s,v)=>s+(+v.profit||0),0),0);
  const caEncaisse=getCommandes().filter(c=>monthKey(c.date)===mk&&c.statut==="paye").reduce((a,c)=>a+(+c.total||0),0)+caDirectMois;
  const caCredit=getCommandes().filter(c=>monthKey(c.date)===mk&&c.statut==="credit").reduce((a,c)=>a+(+c.total||0),0);
  const benefBrut=ventes.reduce((a,c)=>a+(+c.profit||0),0)+benefDirectMois;
  const depMois=getDepenses().filter(d=>d.mois===mk).reduce((a,d)=>a+(+d.montant||0),0);
  const benefNet=benefBrut-depMois;
  const retraitsHadi=getRetraits().filter(r=>r.assoc==="Hadi"&&!r.solde).reduce((a,r)=>a+(+r.montant||0),0);
  const retraitsYoussef=getRetraits().filter(r=>r.assoc==="Youssef"&&!r.solde).reduce((a,r)=>a+(+r.montant||0),0);
  const benefApresRetraits=benefNet-retraitsHadi-retraitsYoussef;

  // Capital mobilisé
  const stockValue=getProducts().reduce((a,p)=>a+(+p.stock||0)*(+p.prixAchat||0),0);
  const soldeDepart=+(fbCaisseConfig.soldeDepart||0);
  const moves=getCaisseMoves();
  const caisseSolde=soldeDepart+moves.filter(m=>m.type==="in").reduce((a,m)=>a+(+m.montant||0),0)-moves.filter(m=>m.type==="out").reduce((a,m)=>a+(+m.montant||0),0);
  const creditsDus=getCredits().filter(c=>c.status!=="soldé").reduce((a,c)=>a+(+c.montantRestant||0),0);
  const depotsValue=getDepots().reduce((a,d)=>{const restant=Math.max(0,(+d.qtyDeposited||0)-(+d.qtySold||0)-(+d.qtyReturned||0));return a+restant*(+d.prixAchat||0);},0);
  const achatsEnAttente=getAchats().filter(a=>a.statut==="attente").reduce((a,x)=>a+(+x.total||0),0);
  const capitalMobilise=stockValue+caisseSolde+creditsDus+depotsValue+achatsEnAttente;

  const nbAttenteCommandes=getCommandes().filter(c=>c.statut==="attente").length;
  const nbAttenteAchats=getAchats().filter(a=>a.statut==="attente").length;

  el("content").innerHTML=`
  <div class="sec-head"><span class="sec-title">${backBtn()}📊 Dashboard</span></div>
  <div class="card">
  <div style="font-weight:900;font-size:16px;margin-bottom:10px">${MOIS[+mk.slice(5,7)-1]} ${mk.slice(0,4)} <span style="color:var(--green);font-size:11px;font-weight:700">En cours</span></div>
  <div class="grid2" style="margin-bottom:10px">
  <div class="stat-box" style="border-color:#22c55e44"><div class="stat-label">CA encaissé</div><div class="stat-val" style="color:var(--green)">${cfa(caEncaisse)}</div></div>
  <div class="stat-box" style="border-color:#3b82f644"><div class="stat-label">CA crédit</div><div class="stat-val" style="color:var(--blue)">${cfa(caCredit)}</div></div>
  </div>
  </div>

  <div class="card" style="border-color:#22c55e55">
  <div class="stat-label">💰 Bénéfice net réel (mois)</div>
  <div style="font-size:22px;font-weight:900;font-family:monospace;color:${benefNet>=0?"var(--green)":"var(--red)"}">${benefNet>=0?"+":""}${cfa(benefNet)}</div>
  <div class="stat-sub">Brut: ${cfa(benefBrut)} · Dép: -${cfa(depMois)}</div>
  ${(retraitsHadi+retraitsYoussef)>0?`<div style="margin-top:8px;padding-top:8px;border-top:1px solid var(--border)">
  <div style="font-size:10px;color:var(--muted);margin-bottom:2px">Après retraits (-${cfa(retraitsHadi+retraitsYoussef)})</div>
  <div style="font-family:monospace;font-weight:800;font-size:15px;color:${benefApresRetraits>=0?"var(--green)":"var(--red)"}">${benefApresRetraits>=0?"+":""}${cfa(benefApresRetraits)}</div>
  </div>`:""}
  </div>

  <div class="card" style="border-color:#8b5cf655">
  <div class="stat-label">💼 Capital mobilisé 👆</div>
  <div style="font-size:22px;font-weight:900;font-family:monospace;color:var(--violet)">${cfa(capitalMobilise)}</div>
  <div class="stat-sub">Stock+Caisse+Crédits+Dépôts+Achats</div>
  </div>

  <div class="grid2">
  <div class="stat-box" style="border-color:#f59e0b44"><div class="stat-label">📦 Commandes attente</div><div class="stat-val" style="color:var(--amber)">${nbAttenteCommandes}</div></div>
  <div class="stat-box" style="border-color:#f59e0b44"><div class="stat-label">🚚 Achats attente</div><div class="stat-val" style="color:var(--amber)">${nbAttenteAchats}</div></div>
  </div>
  `;
}

// ===================================================================
// FIREBASE INIT
// ===================================================================
function setSync(ok){
  el("sync-dot").className="sync-dot"+(ok?"":" off");
  el("sync-text").textContent=ok?"Synchronisé en temps réel":"Connexion...";
}

document.addEventListener("DOMContentLoaded",function(){
  el("login-pw").addEventListener("keydown",e=>{if(e.key==="Enter")login();});
  try{
    fbApp=initializeApp(firebaseConfig);
    db=getDatabase(fbApp);
    onValue(ref(db,"products"),snap=>{fbProducts=snap.val()||{};loaded.products=true;setSync(true);render();});
    onValue(ref(db,"commandes"),snap=>{fbCommandes=snap.val()||{};loaded.commandes=true;render();});
    onValue(ref(db,"caisseMoves"),snap=>{fbCaisseMoves=snap.val()||{};loaded.caisseMoves=true;render();});
    onValue(ref(db,"credits"),snap=>{fbCredits=snap.val()||{};loaded.credits=true;render();});
    onValue(ref(db,"caisseConfig"),snap=>{fbCaisseConfig=snap.val()||{};loaded.caisseConfig=true;render();});
    onValue(ref(db,"achats"),snap=>{fbAchats=snap.val()||{};loaded.achats=true;render();});
    onValue(ref(db,"depots"),snap=>{fbDepots=snap.val()||{};loaded.depots=true;render();});
    onValue(ref(db,"depenses"),snap=>{fbDepenses=snap.val()||{};loaded.depenses=true;render();});
    onValue(ref(db,"retraits"),snap=>{fbRetraits=snap.val()||{};loaded.retraits=true;render();});
    onValue(ref(db,"rapports"),snap=>{fbRapports=snap.val()||{};loaded.rapports=true;render();});
  }catch(e){
    console.error("Firebase init error:",e);
    setSync(false);
  }
});
</script>
